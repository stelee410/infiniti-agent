<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infiniti LiveUI</title>
    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
      }
      /* 无边框窗口：顶部区域可拖动（Electron / Chromium） */
      #drag-bar {
        -webkit-app-region: drag;
        app-region: drag;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 28px;
        z-index: 100;
        /* 略可见，便于发现拖动手柄；可改为 transparent 仍可拖 */
        background: rgba(0, 0, 0, 0.15);
      }
      canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="drag-bar" title="拖动窗口"></div>
    <canvas id="app"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
