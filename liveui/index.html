<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infiniti LiveUI</title>
    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
      }
      canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      /* 底部：字幕 + 参考截图的深色控制条（左按钮簇 + 右输入） */
      #liveui-bottom-dock {
        position: fixed;
        z-index: 150;
        left: 50%;
        /* 略贴底边，把画布留给全身（含脚） */
        bottom: max(4px, env(safe-area-inset-bottom, 0px));
        transform: translateX(-50%);
        width: min(96vw, 720px);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        pointer-events: none;
      }
      #liveui-bottom-dock > * {
        pointer-events: auto;
      }
      /* 气泡：脱离底部 dock，半透明叠在人物身上 */
      #speech-bubble {
        position: fixed;
        z-index: 120;
        left: 50%;
        transform: translateX(-50%);
        /* 位于屏幕中下部；JS 会动态调整 bottom 使其刚好在控制条上方、覆盖人物躯干区域 */
        bottom: 30%;
        width: min(82vw, 560px);
        box-sizing: border-box;
        padding: 14px 20px;
        border-radius: 18px;
        background: rgba(12, 14, 22, 0.52);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      #speech-bubble.visible {
        opacity: 1;
      }
      #speech-bubble-text {
        margin: 0;
        font: 15px/1.6 system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: rgba(255, 255, 255, 0.92);
        white-space: pre-wrap;
        word-break: break-word;
        user-select: none;
        max-height: 40vh;
        overflow-y: auto;
      }
      #liveui-control-bar {
        box-sizing: border-box;
        width: 100%;
        padding: 10px 12px 12px;
        border-radius: 18px;
        background: #14161c;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        /* 空白处拖动窗口；交互区由子元素 no-drag 排除 */
        -webkit-app-region: drag;
        app-region: drag;
        cursor: grab;
      }
      #liveui-control-bar:active {
        cursor: grabbing;
      }
      #liveui-bar-body {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 12px;
        -webkit-app-region: no-drag;
        app-region: no-drag;
        cursor: default;
      }
      #liveui-bar-side {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        width: 108px;
      }
      .liveui-status-pill {
        box-sizing: border-box;
        width: 100%;
        padding: 8px 5px;
        border-radius: 10px;
        text-align: center;
        font: 10px/1.25 system-ui, sans-serif;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.12);
        user-select: none;
        word-break: break-word;
        hyphens: auto;
        transition: background 0.2s ease, box-shadow 0.2s ease;
      }
      .liveui-status-pill--ready {
        background: linear-gradient(180deg, #8b5cf6 0%, #6d28d9 100%);
        box-shadow: 0 2px 8px rgba(109, 40, 217, 0.35);
      }
      .liveui-status-pill--busy {
        background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%);
        box-shadow: 0 2px 8px rgba(2, 132, 199, 0.35);
      }
      .liveui-status-pill--warn {
        background: linear-gradient(180deg, #fbbf24 0%, #b45309 100%);
        box-shadow: 0 2px 8px rgba(180, 83, 9, 0.35);
      }
      .liveui-status-pill--loading {
        background: linear-gradient(180deg, #64748b 0%, #334155 100%);
        box-shadow: 0 2px 8px rgba(51, 65, 85, 0.35);
      }
      #liveui-icon-cluster {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .liveui-icon-btn {
        -webkit-app-region: no-drag;
        app-region: no-drag;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        aspect-ratio: 1;
        min-height: 0;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: #fff;
        transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
      }
      .liveui-icon-btn:hover {
        filter: brightness(1.08);
      }
      .liveui-icon-btn:active {
        transform: scale(0.96);
      }
      .liveui-icon-btn svg {
        width: 20px;
        height: 20px;
        display: block;
      }
      .liveui-hand-emoji {
        font-size: 19px;
        line-height: 1;
        display: block;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.25));
      }
      .liveui-icon-btn--speaker {
        background: linear-gradient(180deg, #34d399 0%, #059669 100%);
        box-shadow: 0 2px 6px rgba(5, 150, 105, 0.35);
        transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
      }
      .liveui-icon-btn--speaker[aria-pressed="false"] {
        background: linear-gradient(180deg, #52525b 0%, #3f3f46 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        opacity: 0.7;
      }
      .liveui-icon-btn--mic {
        background: linear-gradient(180deg, #52525b 0%, #3f3f46 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        transition: background 0.2s, box-shadow 0.2s;
      }
      .liveui-icon-btn--mic[aria-pressed="true"] {
        background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
        box-shadow: 0 2px 6px rgba(220,38,38,0.45);
      }
      .liveui-icon-btn--hand {
        background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
        box-shadow: 0 2px 6px rgba(217, 119, 6, 0.35);
      }
      #liveui-composer {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 2px;
        padding: 4px 6px 4px 8px;
        border-radius: 12px;
        background: #1e2128;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      #liveui-composer:focus-within {
        border-color: rgba(110, 197, 255, 0.45);
        box-shadow: 0 0 0 1px rgba(110, 197, 255, 0.15);
      }
      .liveui-attach-btn {
        -webkit-app-region: no-drag;
        app-region: no-drag;
        flex: 0 0 auto;
        align-self: flex-start;
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: rgba(255, 255, 255, 0.45);
        cursor: not-allowed;
        opacity: 0.65;
      }
      .liveui-attach-btn svg {
        width: 18px;
        height: 18px;
      }
      #liveui-user-line {
        flex: 1;
        min-width: 0;
        box-sizing: border-box;
        margin: 0;
        padding: 8px 10px 8px 4px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: rgba(255, 255, 255, 0.96);
        font: 14px/1.45 system-ui, -apple-system, 'Segoe UI', sans-serif;
        outline: none;
        -webkit-app-region: no-drag;
        app-region: no-drag;
        min-height: 40px;
        max-height: 168px;
        resize: none;
        overflow-y: auto;
        field-sizing: content;
        line-height: 1.45;
      }
      @supports not (field-sizing: content) {
        #liveui-user-line {
          min-height: 72px;
        }
      }
      #liveui-user-line::placeholder {
        color: rgba(255, 255, 255, 0.38);
      }
      #liveui-slash-menu {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 100%;
        margin-bottom: 8px;
        max-height: min(40vh, 280px);
        overflow: hidden auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(30, 33, 40, 0.96);
        border: 1px solid rgba(250, 204, 21, 0.45);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        -webkit-app-region: no-drag;
        app-region: no-drag;
        z-index: 20;
      }
      #liveui-slash-menu[hidden] {
        display: none !important;
      }
      #liveui-slash-menu-title {
        font: 600 13px system-ui, sans-serif;
        color: #fde047;
      }
      #liveui-slash-menu-hint {
        font: 12px system-ui, sans-serif;
        color: rgba(255, 255, 255, 0.45);
      }
      #liveui-slash-menu-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .liveui-slash-row {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 6px;
        padding: 4px 6px;
        border-radius: 8px;
        font: 13px/1.4 system-ui, sans-serif;
        cursor: default;
      }
      .liveui-slash-row--active {
        background: rgba(34, 211, 238, 0.12);
      }
      .liveui-slash-kind {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
      }
      .liveui-slash-label {
        color: #4ade80;
        font-weight: 600;
      }
      .liveui-slash-row--active .liveui-slash-label {
        color: #22d3ee;
      }
      .liveui-slash-desc {
        color: rgba(255, 255, 255, 0.55);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="speech-bubble" aria-hidden="true">
      <p id="speech-bubble-text"></p>
    </div>
    <div id="liveui-bottom-dock">
      <div
        id="liveui-slash-menu"
        hidden
        aria-hidden="true"
        role="listbox"
        aria-label="斜杠命令补全"
      >
        <div id="liveui-slash-menu-title">/ 补全</div>
        <div id="liveui-slash-menu-hint"></div>
        <ul id="liveui-slash-menu-list"></ul>
      </div>
      <div id="liveui-control-bar">
        <div id="liveui-bar-body">
          <aside id="liveui-bar-side">
            <div
              id="liveui-status-pill"
              class="liveui-status-pill liveui-status-pill--loading"
              aria-live="polite"
            >
              加载中…
            </div>
            <div id="liveui-icon-cluster">
              <button
                type="button"
                class="liveui-icon-btn liveui-icon-btn--speaker"
                id="liveui-btn-speaker"
                title="语音回复（TTS）"
                aria-label="语音回复开关"
                aria-pressed="true"
              >
                <svg id="liveui-speaker-icon-on" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor"
                    d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
                <svg id="liveui-speaker-icon-off" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                  <path fill="currentColor"
                    d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                </svg>
              </button>
              <button
                type="button"
                class="liveui-icon-btn liveui-icon-btn--mic"
                id="liveui-btn-mic"
                title="语音输入（ASR）"
                aria-label="语音输入"
                aria-pressed="false"
              >
                <svg id="liveui-mic-icon-idle" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor"
                    d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                <svg id="liveui-mic-icon-recording" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                  <path fill="currentColor"
                    d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                  <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4">
                    <animate attributeName="r" values="10;12;10" dur="1.2s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.2s" repeatCount="indefinite"/>
                  </circle>
                </svg>
              </button>
              <button
                type="button"
                class="liveui-icon-btn liveui-icon-btn--hand"
                id="liveui-btn-hand"
                title="举手 / 打断（即将支持）"
                aria-label="举手，即将支持"
              >
                <span class="liveui-hand-emoji" aria-hidden="true">✋</span>
              </button>
            </div>
          </aside>
          <div id="liveui-composer">
            <button
              type="button"
              class="liveui-attach-btn"
              id="liveui-btn-attach"
              disabled
              title="附件（即将支持）"
              aria-label="附件，即将支持"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"
                />
              </svg>
            </button>
            <textarea
              id="liveui-user-line"
              rows="1"
              placeholder="输入消息… Shift+Enter 换行，Enter 发送"
              spellcheck="false"
              autocomplete="off"
              aria-label="对话输入"
            ></textarea>
          </div>
        </div>
      </div>
    </div>
    <canvas id="app"></canvas>
    <!-- Cubism 4 Core：须先于模块执行。使用相对路径，保证 Electron file:// 与 Vite dev 均能加载（文件来自 liveui/public/） -->
    <script src="./live2dcubismcore.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
