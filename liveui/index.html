<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infiniti LiveUI</title>
    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        background: transparent;
      }
      canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      body.liveui-minimal-mode canvas,
      body.liveui-minimal-mode #liveui-bar-side,
      body.liveui-minimal-mode #liveui-inbox {
        display: none !important;
      }
      body.liveui-minimal-mode #liveui-bottom-dock {
        width: auto;
        max-width: calc(100vw - 16px);
      }
      body.liveui-minimal-mode #liveui-control-bar {
        padding: 8px;
        border-radius: 14px;
        background: rgba(20, 22, 28, 0.92);
      }
      body.liveui-minimal-mode #liveui-bar-body {
        display: block;
      }
      body.liveui-minimal-mode #liveui-composer {
        width: 220px;
        min-height: 48px;
      }
      body.liveui-minimal-mode #liveui-user-line {
        height: 40px;
      }
      /* 底部：字幕 + 参考截图的深色控制条（左按钮簇 + 右输入） */
      #liveui-bottom-dock {
        position: fixed;
        z-index: 150;
        left: 50%;
        /* 略贴底边，把画布留给全身（含脚） */
        bottom: max(4px, env(safe-area-inset-bottom, 0px));
        transform: translateX(-50%);
        width: min(96vw, 720px);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        pointer-events: none;
      }
      #liveui-bottom-dock > * {
        pointer-events: auto;
      }
      body.liveui-config-open #liveui-bottom-dock,
      body.liveui-config-open #speech-bubble,
      body.liveui-config-open #liveui-inbox {
        display: none !important;
      }
      body.liveui-inbox-open #liveui-bottom-dock,
      body.liveui-inbox-open #speech-bubble {
        display: none !important;
      }
      body.liveui-camera-capture-open #app,
      body.liveui-camera-capture-open #liveui-real2d-stage,
      body.liveui-camera-capture-open #speech-bubble,
      body.liveui-camera-capture-open #liveui-bottom-dock,
      body.liveui-camera-capture-open #liveui-inbox,
      body.liveui-camera-capture-open .liveui-debug-edge {
        display: none !important;
      }
      body.liveui-h5-applet-open #app,
      body.liveui-h5-applet-open #liveui-real2d-stage,
      body.liveui-h5-applet-open #speech-bubble,
      body.liveui-h5-applet-open #liveui-bottom-dock,
      body.liveui-h5-applet-open #liveui-slash-menu,
      body.liveui-h5-applet-open .liveui-debug-edge {
        display: none !important;
      }
      /* 通话模式：隐藏底部输入区，露挂断按钮 */
      body.liveui-call-mode #liveui-bottom-dock,
      body.liveui-call-mode #speech-bubble {
        display: none !important;
      }
      #liveui-call-overlay {
        position: fixed;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 220;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        pointer-events: auto;
      }
      #liveui-call-overlay[hidden] { display: none !important; }
      #liveui-btn-hangup {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: linear-gradient(180deg, #f15a5a 0%, #c62828 100%);
        border: none;
        box-shadow: 0 6px 22px rgba(198, 40, 40, 0.45);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotate(135deg);
        transition: transform .15s ease, box-shadow .15s ease;
      }
      #liveui-btn-hangup:hover {
        transform: rotate(135deg) scale(1.04);
        box-shadow: 0 8px 28px rgba(198, 40, 40, 0.55);
      }
      #liveui-btn-hangup:active {
        transform: rotate(135deg) scale(0.96);
      }
      #liveui-btn-hangup svg { width: 28px; height: 28px; }
      .liveui-debug-edge {
        position: fixed;
        z-index: 260;
        top: 50%;
        transform: translateY(-50%);
        box-sizing: border-box;
        max-width: 42vw;
        white-space: pre-line;
        pointer-events: none;
        color: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 15px;
        font-weight: 800;
        line-height: 1.35;
        letter-spacing: 0;
        -webkit-text-stroke: 3px rgba(0, 0, 0, 0.95);
        paint-order: stroke fill;
        text-shadow:
          0 1px 0 #000,
          1px 0 0 #000,
          0 -1px 0 #000,
          -1px 0 0 #000,
          0 3px 10px rgba(0, 0, 0, 0.75);
      }
      #liveui-debug-emotion {
        left: 10px;
        text-align: left;
      }
      #liveui-debug-relationship {
        right: 10px;
        text-align: right;
      }
      /* 气泡：脱离底部 dock，半透明叠在人物身上 */
      #speech-bubble {
        position: fixed;
        z-index: 120;
        left: 50%;
        transform: translateX(-50%);
        /* 位于屏幕中下部；JS 会动态调整 bottom 使其刚好在控制条上方、覆盖人物躯干区域 */
        bottom: 30%;
        width: min(82vw, 560px);
        box-sizing: border-box;
        padding: 14px 20px;
        border-radius: 18px;
        background: rgba(12, 14, 22, 0.52);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.10);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.35s ease;
      }
      body.liveui-minimal-mode #speech-bubble {
        pointer-events: auto;
        cursor: pointer;
      }
      #speech-bubble.liveui-bubble-waiting .liveui-bubble-first-char {
        display: inline-block;
        animation: liveui-first-letter-blink 0.9s ease-in-out infinite;
      }
      @keyframes liveui-first-letter-blink {
        0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(125, 211, 252, 0.7); }
        50% { opacity: 0.2; text-shadow: 0 0 2px rgba(125, 211, 252, 0.2); }
      }
      #speech-bubble.visible {
        opacity: 1;
      }
      #speech-bubble-text.liveui-md-root {
        margin: 0;
        font: 15px/1.55 system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: rgba(255, 255, 255, 0.95);
        word-break: break-word;
        user-select: none;
        /* 电影字幕：根据回复长度调整可视行数，超出由 typewriter 平滑向上滚动；
           隐藏滚动条但仍允许 JS 设置 scrollTop。 */
        max-height: calc(15px * 1.55 * var(--liveui-bubble-lines, 3) + 0.2em);
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.55),
          0 0 6px rgba(0, 0, 0, 0.45);
      }
      #speech-bubble-text.liveui-md-root::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }
      #liveui-inbox {
        position: fixed;
        z-index: 210;
        top: max(12px, env(safe-area-inset-top, 0px));
        left: 14px;
        display: none;
        align-items: flex-start;
        gap: 10px;
        pointer-events: auto;
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
      #liveui-inbox.liveui-inbox--visible {
        display: flex;
      }
      #liveui-inbox-toggle {
        box-sizing: border-box;
        width: 42px;
        height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        border: 1px solid rgba(251, 191, 36, 0.55);
        border-radius: 10px;
        background: rgba(31, 41, 55, 0.92);
        color: #fef3c7;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.38);
        cursor: pointer;
        transform: translate(-42%, -38%);
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
      #liveui-inbox-toggle:hover {
        background: rgba(55, 65, 81, 0.96);
        border-color: rgba(253, 230, 138, 0.78);
      }
      #liveui-inbox-toggle svg {
        width: 22px;
        height: 22px;
        display: block;
        pointer-events: none;
      }
      #liveui-inbox-panel {
        box-sizing: border-box;
        width: min(82vw, 360px);
        max-height: min(72vh, 580px);
        display: none;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        border-radius: 14px;
        background: rgba(20, 22, 28, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 18px 46px rgba(0, 0, 0, 0.48);
        color: rgba(255, 255, 255, 0.94);
        overflow-y: auto;
        -webkit-app-region: no-drag;
        app-region: no-drag;
        cursor: default;
      }
      #liveui-inbox.liveui-inbox--open #liveui-inbox-panel {
        display: flex;
      }
      body.liveui-inbox-open #liveui-inbox {
        inset: 0;
        left: 0 !important;
        top: 0 !important;
        width: 100vw;
        height: 100vh;
        padding: 18px;
        box-sizing: border-box;
        align-items: stretch;
        justify-content: stretch;
        background: rgba(10, 12, 18, 0.72);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      body.liveui-inbox-open #liveui-inbox-toggle {
        position: fixed;
        top: 18px;
        right: 18px;
        left: auto;
        z-index: 2;
        transform: none;
        background: #7f1d1d;
        border-color: rgba(252, 165, 165, 0.55);
        color: #fff7f7;
      }
      body.liveui-inbox-open #liveui-inbox-panel {
        display: flex;
        width: 100%;
        max-width: none;
        max-height: none;
        padding: 18px;
        border-radius: 18px;
      }
      body.liveui-inbox-open .liveui-inbox-image,
      body.liveui-inbox-open .liveui-inbox-video {
        max-height: min(62vh, 620px);
      }
      .liveui-inbox-mail {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .liveui-inbox-subject {
        font: 650 14px/1.35 system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: #fff7ed;
        word-break: break-word;
      }
      .liveui-inbox-time {
        font: 11px/1.25 system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: rgba(255, 255, 255, 0.54);
      }
      .liveui-inbox-body {
        white-space: pre-wrap;
        word-break: break-word;
        font: 13px/1.55 system-ui, -apple-system, 'Segoe UI', sans-serif;
        color: rgba(255, 255, 255, 0.9);
      }
      .liveui-inbox-media-wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .liveui-inbox-image,
      .liveui-inbox-video {
        display: block;
        width: 100%;
        max-height: 320px;
        object-fit: contain;
        border-radius: 10px;
        background: #0f1117;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .liveui-inbox-video {
        aspect-ratio: 16 / 9;
        min-height: 180px;
      }
      .liveui-inbox-media-hint {
        color: rgba(255, 255, 255, 0.54);
        font: 11px/1.35 system-ui, -apple-system, 'Segoe UI', sans-serif;
        overflow-wrap: anywhere;
      }
      .liveui-inbox-media-wrap--error .liveui-inbox-media-hint::before {
        content: '预览加载失败，可另存或用系统播放器打开：';
        color: #fca5a5;
      }
      .liveui-inbox-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .liveui-inbox-action {
        box-sizing: border-box;
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(148, 163, 184, 0.38);
        border-radius: 9px;
        background: #1f2937;
        color: #f8fafc;
        cursor: pointer;
      }
      .liveui-inbox-action:hover {
        background: #334155;
        border-color: rgba(226, 232, 240, 0.62);
      }
      .liveui-inbox-action svg {
        width: 18px;
        height: 18px;
        display: block;
        pointer-events: none;
      }
      .liveui-md-root :where(p, ul, ol, pre, h1, h2, h3, h4, h5, h6, blockquote, table, hr) {
        margin: 0.45em 0;
      }
      .liveui-md-root :first-child {
        margin-top: 0;
      }
      .liveui-md-root :last-child {
        margin-bottom: 0;
      }
      .liveui-md-root h1 {
        font-size: 1.2em;
        font-weight: 700;
        line-height: 1.25;
      }
      .liveui-md-root h2 {
        font-size: 1.1em;
        font-weight: 650;
        line-height: 1.3;
      }
      .liveui-md-root h3,
      .liveui-md-root h4 {
        font-size: 1.02em;
        font-weight: 600;
      }
      .liveui-md-root ul,
      .liveui-md-root ol {
        padding-left: 1.35em;
      }
      .liveui-md-root li {
        margin: 0.15em 0;
      }
      .liveui-md-root a {
        color: #7dd3fc;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .liveui-md-root blockquote {
        margin-left: 0;
        padding-left: 0.75em;
        border-left: 3px solid rgba(125, 211, 252, 0.45);
        color: rgba(255, 255, 255, 0.78);
      }
      .liveui-md-root hr {
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.14);
      }
      .liveui-md-root pre {
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.38);
        font-size: 12px;
        line-height: 1.45;
        max-height: 22vh;
        overflow: auto;
      }
      .liveui-md-root code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.88em;
        background: rgba(0, 0, 0, 0.35);
        padding: 0.12em 0.38em;
        border-radius: 4px;
      }
      .liveui-md-root pre code {
        background: transparent;
        padding: 0;
        font-size: inherit;
      }
      .liveui-md-root table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88em;
      }
      .liveui-md-root th,
      .liveui-md-root td {
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 0.28em 0.45em;
        text-align: left;
      }
      .liveui-md-root th {
        background: rgba(255, 255, 255, 0.06);
      }
      #liveui-control-bar {
        box-sizing: border-box;
        position: relative;
        width: 100%;
        padding: 10px 12px 12px;
        border-radius: 18px;
        background: #14161c;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        /* 空白处拖动窗口；交互区由子元素 no-drag 排除 */
        -webkit-app-region: drag;
        app-region: drag;
        cursor: grab;
      }
      #liveui-control-bar:active {
        cursor: grabbing;
      }
      #liveui-avatar-fallback {
        box-sizing: border-box;
        flex: 0 0 auto;
        align-self: center;
        width: 64px;
        height: 64px;
        margin: 0 auto 2px;
        border-radius: 50%;
        object-fit: cover;
        background: #0f172a;
        border: 2px solid rgba(255, 255, 255, 0.78);
        box-shadow:
          0 10px 24px rgba(0, 0, 0, 0.48),
          0 0 0 5px rgba(20, 22, 28, 0.86);
        pointer-events: none;
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
      #liveui-avatar-fallback[hidden] {
        display: none;
      }
      #liveui-window-tools {
        position: absolute;
        top: -18px;
        right: 16px;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 7px;
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
      .liveui-window-tool {
        box-sizing: border-box;
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        border: 1px solid rgba(148, 163, 184, 0.45);
        border-radius: 9px;
        background: #243244;
        color: #f8fafc;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.36);
        cursor: pointer;
        transition:
          transform 0.12s ease,
          background 0.12s ease,
          color 0.12s ease,
          border-color 0.12s ease;
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
      .liveui-window-tool:hover {
        transform: translateY(-1px);
        background: #334155;
        border-color: rgba(226, 232, 240, 0.62);
        color: #ffffff;
      }
      .liveui-window-tool svg {
        width: 19px;
        height: 19px;
        display: block;
        pointer-events: none;
        cursor: inherit;
      }
      .liveui-window-tool--drag {
        background: #155e75;
        border-color: rgba(103, 232, 249, 0.48);
      }
      .liveui-window-tool--minimal {
        background: #155e75;
        border-color: rgba(103, 232, 249, 0.48);
      }
      .liveui-window-tool--minimal:hover,
      .liveui-window-tool--minimal[aria-pressed="true"] {
        background: #0e7490;
        border-color: rgba(165, 243, 252, 0.72);
      }
      .liveui-window-tool--drag {
        cursor: -webkit-grab;
        cursor: grab;
        -webkit-app-region: no-drag;
        app-region: no-drag;
        user-select: none;
      }
      .liveui-window-tool--drag:hover {
        background: #0e7490;
        border-color: rgba(165, 243, 252, 0.72);
      }
      .liveui-window-tool--drag:active {
        cursor: -webkit-grabbing;
        cursor: grabbing;
      }
      .liveui-window-tool--drag.liveui-window-tool--dragging,
      body.liveui-window-dragging,
      body.liveui-window-dragging * {
        cursor: -webkit-grabbing !important;
        cursor: grabbing !important;
      }
      .liveui-window-tool--close {
        background: #7f1d1d;
        border-color: rgba(252, 165, 165, 0.5);
      }
      .liveui-window-tool--close:hover {
        background: #b91c1c;
        border-color: rgba(254, 202, 202, 0.78);
        color: #fff7f7;
      }
      #liveui-bar-body {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 12px;
        -webkit-app-region: no-drag;
        app-region: no-drag;
        cursor: default;
      }
      #liveui-bar-side {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        width: 108px;
      }
      .liveui-status-pill {
        box-sizing: border-box;
        width: 100%;
        padding: 8px 5px;
        border-radius: 10px;
        text-align: center;
        font: 10px/1.25 system-ui, sans-serif;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.12);
        user-select: none;
        word-break: break-word;
        hyphens: auto;
        transition: background 0.2s ease, box-shadow 0.2s ease;
      }
      .liveui-status-pill--ready {
        background: linear-gradient(180deg, #8b5cf6 0%, #6d28d9 100%);
        box-shadow: 0 2px 8px rgba(109, 40, 217, 0.35);
      }
      .liveui-status-pill--busy {
        background: linear-gradient(180deg, #38bdf8 0%, #0284c7 100%);
        box-shadow: 0 2px 8px rgba(2, 132, 199, 0.35);
      }
      .liveui-status-pill--warn {
        background: linear-gradient(180deg, #fbbf24 0%, #b45309 100%);
        box-shadow: 0 2px 8px rgba(180, 83, 9, 0.35);
      }
      .liveui-status-pill--loading {
        background: linear-gradient(180deg, #64748b 0%, #334155 100%);
        box-shadow: 0 2px 8px rgba(51, 65, 85, 0.35);
      }
      #liveui-icon-cluster {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .liveui-icon-btn {
        -webkit-app-region: no-drag;
        app-region: no-drag;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        aspect-ratio: 1;
        min-height: 0;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: #fff;
        transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
      }
      .liveui-icon-btn:hover {
        filter: brightness(1.08);
      }
      .liveui-icon-btn:active {
        transform: scale(0.96);
      }
      .liveui-icon-btn:disabled {
        cursor: not-allowed;
        opacity: 0.42;
        filter: grayscale(0.35);
        pointer-events: none;
      }
      .liveui-icon-btn svg {
        width: 20px;
        height: 20px;
        display: block;
      }
      .liveui-icon-btn--speaker {
        background: linear-gradient(180deg, #34d399 0%, #059669 100%);
        box-shadow: 0 2px 6px rgba(5, 150, 105, 0.35);
        transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
      }
      .liveui-icon-btn--speaker[aria-pressed="false"] {
        background: linear-gradient(180deg, #52525b 0%, #3f3f46 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
        opacity: 0.7;
      }
      .liveui-icon-btn--mic {
        background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);

        transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
      }
      .liveui-h5-launcher-btn:nth-child(even) {
        animation-name: liveui-h5-item-in-right;
      }
      .liveui-h5-launcher-btn:nth-child(1) { animation-delay: 30ms; }
      .liveui-h5-launcher-btn:nth-child(2) { animation-delay: 80ms; }
      .liveui-h5-launcher-btn:nth-child(3) { animation-delay: 130ms; }
      .liveui-h5-launcher-btn:nth-child(4) { animation-delay: 180ms; }
      .liveui-h5-launcher-btn:nth-child(n + 5) {
        animation-delay: 220ms;
      }
      .liveui-h5-launcher-btn:hover {
        transform: translateY(-1px);
        background:
          linear-gradient(180deg, rgba(71, 85, 105, 0.72), rgba(30, 41, 59, 0.66));
        border-color: rgba(125, 211, 252, 0.78);
      }
      .liveui-h5-launcher-icon {
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.5), transparent 22%),
          linear-gradient(135deg, #6d28d9, #2563eb);
        color: #fff;
        box-shadow:
          0 0 18px rgba(96, 165, 250, 0.28),
          inset 0 0 0 1px rgba(255, 255, 255, 0.18);
        font: 900 17px/1 system-ui, sans-serif;
      }
      .liveui-h5-launcher-text {
        min-width: 0;
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .liveui-h5-launcher-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .liveui-h5-launcher-desc {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: rgba(226, 232, 240, 0.62);
        font: 500 11px/1.2 system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      .liveui-h5-launcher-arrow {
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
        color: rgba(226, 232, 240, 0.78);
      }
      .liveui-h5-launcher-arrow svg {
        width: 20px;
        height: 20px;
        display: block;
      }
      .liveui-h5-launcher-trigger {
        position: relative;
        background: #243244;
        border-color: rgba(148, 163, 184, 0.45);
      }
      .liveui-h5-launcher-trigger:hover,
      .liveui-h5-launcher--open .liveui-h5-launcher-trigger {
        background: #334155;
        border-color: rgba(226, 232, 240, 0.62);
      }
      .liveui-h5-launcher-trigger-icon {
        width: 19px;
        height: 19px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: currentColor;
      }
      .liveui-h5-launcher-trigger-icon svg {
        width: 19px;
        height: 19px;
        display: block;
        pointer-events: none;
      }
      .liveui-h5-applet {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        min-height: 0;
        max-height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.26);
        border-radius: 8px;
        background: #020617;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
        pointer-events: auto;
        -webkit-app-region: no-drag;
        app-region: no-drag;
      }
      .liveui-h5-applet--fullscreen,
      .liveui-h5-applet--overlay {
        position: relative;
        inset: auto;
        width: 100%;
        height: 100%;
        min-height: 0;
        max-height: 100%;
      }
      .liveui-h5-applet-head {
        height: 38px;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 8px 0 12px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(2, 6, 23, 0.78);
      }
      .liveui-h5-applet-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: rgba(255, 255, 255, 0.9);
        font: 700 13px/1.2 system-ui, -apple-system, 'Segoe UI', sans-serif;
        letter-spacing: 0;
      }
      .liveui-h5-applet-close {
        width: 30px;
        height: 30px;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: rgba(226, 232, 240, 0.8);
        cursor: pointer;
      }
      .liveui-h5-applet-close:hover {
        background: rgba(248, 113, 113, 0.16);
        color: #fecaca;
      }
      .liveui-h5-applet-close svg {
        width: 18px;
        height: 18px;
        pointer-events: none;
      }
      .liveui-h5-applet-frame-shell {
        flex: 1 1 auto;
        width: 100%;
        height: 100%;
        min-height: 0;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        overflow: hidden;
        background: #020617;
      }
      .liveui-h5-applet-frame {
        flex: 0 0 auto;
        width: var(--liveui-h5-virtual-width, 100%);
        height: var(--liveui-h5-virtual-height, 100%);
        border: 0;
        background: #020617;
        transform: scale(var(--liveui-h5-frame-scale, 1));
        transform-origin: top center;
      }
      @media (max-width: 560px) {
        #liveui-h5-runtime {
          left: 50%;
          right: auto;
          transform: translate(-50%, -50%);
          top: 50%;
          width: calc(100vw - 16px);
          height: min(80vh, 768px);
        }
        .liveui-h5-launcher {
          max-width: none;
        }
        #liveui-config-panel {
          inset: 8px;
        }
        .config-body {
          grid-template-columns: 1fr;
        }
        .config-topbar {
          grid-template-columns: 1fr;
        }
        .config-actions {
          justify-content: space-between;
        }
        .config-tabs {
          flex-direction: row;
          overflow-x: auto;
          border-right: none;
          border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        }
        .config-grid {
          grid-template-columns: 1fr;
        }
        .config-span-2 {
          grid-column: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="liveui-config-panel" hidden aria-hidden="true">
      <div class="config-topbar">
        <div class="config-title">
          <strong>Infiniti 配置</strong>
          <span id="liveui-config-path"></span>
        </div>
        <div class="config-actions">
          <span id="liveui-config-status"></span>
          <button type="button" class="config-btn" id="liveui-config-close">取消</button>
          <button type="button" class="config-btn config-btn--primary" id="liveui-config-save">保存</button>
        </div>
      </div>
      <div class="config-body">
        <nav class="config-tabs" id="liveui-config-tabs"></nav>
        <main class="config-content" id="liveui-config-content"></main>
      </div>
    </div>
    <div id="speech-bubble" aria-hidden="true">
      <div id="speech-bubble-text" class="liveui-md-root"></div>
    </div>
    <div id="liveui-h5-runtime" class="liveui-h5-runtime--empty" aria-live="polite"></div>
    <div id="liveui-debug-emotion" class="liveui-debug-edge" hidden aria-hidden="true"></div>
    <div id="liveui-debug-relationship" class="liveui-debug-edge" hidden aria-hidden="true"></div>
    <div id="liveui-camera-countdown" hidden aria-hidden="true">
      <div id="liveui-camera-widget">
        <div id="liveui-camera-preview-stage"></div>
        <svg id="liveui-camera-countdown-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M9.25 4 7.6 6H4.75A2.75 2.75 0 0 0 2 8.75v8.5A2.75 2.75 0 0 0 4.75 20h14.5A2.75 2.75 0 0 0 22 17.25v-8.5A2.75 2.75 0 0 0 19.25 6H16.4l-1.65-2h-5.5zM12 9a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm6.5-2.2a.8.8 0 1 1 0 1.6.8.8 0 0 1 0-1.6z"/>
        </svg>
        <div id="liveui-camera-countdown-number">3</div>
        <div id="liveui-camera-status">准备拍照</div>
      </div>
    </div>
    <div id="liveui-camera-flash" aria-hidden="true"></div>
    <div id="liveui-inbox" aria-hidden="true">
      <button type="button" id="liveui-inbox-toggle" title="你的邮箱" aria-label="你的邮箱">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2Zm0 4.2-8 5-8-5V6l8 5 8-5v2.2Z"/>
        </svg>
      </button>
      <div id="liveui-inbox-panel" role="dialog" aria-label="你的邮箱"></div>
    </div>
    <div id="liveui-call-overlay" aria-hidden="true" hidden>
      <button type="button" id="liveui-btn-hangup" title="挂断（结束通话）" aria-label="挂断">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.965.965 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.79-.74-1.69-1.36-2.67-1.85a1.01 1.01 0 0 1-.56-.9v-3.1A16.4 16.4 0 0 0 12 9z"/>
        </svg>
      </button>
    </div>
    <div id="liveui-bottom-dock">
      <div
        id="liveui-slash-menu"
        hidden
        aria-hidden="true"
        role="listbox"
        aria-label="斜杠命令补全"
      >
        <div id="liveui-slash-menu-title">/ 补全</div>
        <div id="liveui-slash-menu-hint"></div>
        <ul id="liveui-slash-menu-list"></ul>
      </div>
      <div id="liveui-control-bar">
        <div id="liveui-window-tools" aria-label="窗口操作">
          <button
            type="button"
            class="liveui-window-tool"
            id="liveui-btn-config"
            title="设置"
            aria-label="设置"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65-2-3.46-2.49 1a7.1 7.1 0 0 0-1.69-.98L15 3.25h-4l-.36 2.68c-.6.23-1.16.56-1.69.98l-2.49-1-2 3.46 2.11 1.65c-.04.32-.07.65-.07.98s.02.66.07.98l-2.11 1.65 2 3.46 2.49-1c.53.41 1.09.74 1.69.98l.36 2.68h4l.36-2.68c.6-.23 1.16-.56 1.69-.98l2.49 1 2-3.46-2.11-1.65zM13 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"/>
            </svg>
          </button>
          <button
            type="button"
            class="liveui-window-tool liveui-window-tool--minimal"
            id="liveui-btn-minimal"
            title="极简模式"
            aria-label="极简模式"
            aria-pressed="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M5 7h14v2H5V7zm0 4h14v2H5v-2zm0 4h9v2H5v-2z"/>
            </svg>
          </button>
          <div
            class="liveui-window-tool liveui-window-tool--drag"
            title="拖动窗口"
            aria-label="拖动窗口"
            role="button"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M10 4h4v4h3l-5 5-5-5h3V4zm2 7 5 5h-3v4h-4v-4H7l5-5zM4 10h4v4H4v-4zm12 0h4v4h-4v-4z"/>
            </svg>
          </div>
          <button
            type="button"
            class="liveui-window-tool liveui-window-tool--close"
            id="liveui-btn-exit"
            title="关闭退出"
            aria-label="关闭退出"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.41 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.3-6.29 1.41 1.41z"/>
            </svg>
          </button>
        </div>
        <div id="liveui-bar-body">
          <aside id="liveui-bar-side">
            <img id="liveui-avatar-fallback" alt="" hidden aria-hidden="true" />
            <div
              id="liveui-status-pill"
              class="liveui-status-pill liveui-status-pill--loading"
              aria-live="polite"
            >
              加载中…
            </div>
            <div id="liveui-icon-cluster">
              <button
                type="button"
                class="liveui-icon-btn liveui-icon-btn--speaker"
                id="liveui-btn-speaker"
                title="语音回复（TTS）"
                aria-label="语音回复开关"
                aria-pressed="true"
              >
                <svg id="liveui-speaker-icon-on" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor"
                    d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
                <svg id="liveui-speaker-icon-off" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                  <path fill="currentColor"
                    d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 003.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                </svg>
              </button>
              <button
                type="button"
                class="liveui-icon-btn liveui-icon-btn--mic"
                id="liveui-btn-mic"
                title="电话（与数字人语音对话）"
                aria-label="电话"
                aria-pressed="false"
              >
                <svg id="liveui-mic-icon-idle" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor"
                    d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
                <svg id="liveui-mic-icon-recording" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                  <path fill="currentColor"
                    d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                  <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" opacity="0.4">
                    <animate attributeName="r" values="10;12;10" dur="1.2s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.2s" repeatCount="indefinite"/>
                  </circle>
                </svg>
              </button>
              <button
                type="button"
                class="liveui-icon-btn liveui-icon-btn--camera"
                id="liveui-btn-vision"
                title="拍照"
                aria-label="拍照"
                aria-pressed="false"
                aria-busy="false"
              >
                <svg id="liveui-camera-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M9.25 4 7.6 6H4.75A2.75 2.75 0 0 0 2 8.75v8.5A2.75 2.75 0 0 0 4.75 20h14.5A2.75 2.75 0 0 0 22 17.25v-8.5A2.75 2.75 0 0 0 19.25 6H16.4l-1.65-2h-5.5zM12 9a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm6.5-2.2a.8.8 0 1 1 0 1.6.8.8 0 0 1 0-1.6z"/>
                </svg>
              </button>
            </div>
          </aside>
          <div id="liveui-composer">
            <button
              type="button"
              class="liveui-attach-btn"
              id="liveui-btn-attach"
              title="附件"
              aria-label="附件"
            >
              <svg id="liveui-attach-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"
                />
              </svg>
              <img id="liveui-attachment-thumb" alt="" hidden />
            </button>
            <div id="liveui-attachment-list" hidden></div>
            <textarea
              id="liveui-user-line"
              rows="1"
              placeholder="输入消息… Shift+Enter 换行，Enter 发送"
              spellcheck="false"
              autocomplete="off"
              aria-label="对话输入"
            ></textarea>
          </div>
        </div>
      </div>
    </div>
    <div id="liveui-photo-preview" hidden>
      <img id="liveui-photo-preview-img" alt="" />
      <div class="liveui-photo-preview-actions">
        <button
          type="button"
          class="liveui-photo-action liveui-photo-action--cancel"
          id="liveui-photo-cancel"
          title="取消"
          aria-label="取消"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.41 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.3-6.29 1.41 1.41z"/>
          </svg>
        </button>
        <button
          type="button"
          class="liveui-photo-action liveui-photo-action--confirm"
          id="liveui-photo-confirm"
          title="确认"
          aria-label="确认"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </button>
      </div>
    </div>
    <canvas id="app"></canvas>
    <!-- Cubism 4 Core：须先于模块执行。使用相对路径，保证 Electron file:// 与 Vite dev 均能加载（文件来自 liveui/public/） -->
    <script src="./live2dcubismcore.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
